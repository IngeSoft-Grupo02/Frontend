name: Frontend CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: frontend-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy frontend to EC2
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    env:
      IMAGE_NAME: kingstore-frontend:${{ github.sha }}
      EC2_HOST: ${{ secrets.EC2_HOST }}
      EC2_USER: ${{ secrets.EC2_USER }}
      NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
      NEXT_PUBLIC_API_BASE_URL: ${{ vars.NEXT_PUBLIC_API_BASE_URL }}
      NEXT_PUBLIC_STORE_LOGO_UPLOAD_MODE: ${{ vars.NEXT_PUBLIC_STORE_LOGO_UPLOAD_MODE }}
      NEXT_PUBLIC_MERCHANT_STORE_SYNC_MODE: ${{ vars.NEXT_PUBLIC_MERCHANT_STORE_SYNC_MODE }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deployment configuration
        env:
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_KNOWN_HOSTS: ${{ secrets.EC2_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          test -n "$EC2_HOST"
          test -n "$EC2_USER"
          test -n "$EC2_SSH_KEY"
          test -n "$EC2_KNOWN_HOSTS"
          test -n "$NEXT_PUBLIC_API_URL"
          test -n "$NEXT_PUBLIC_API_BASE_URL"
          test -n "$NEXT_PUBLIC_STORE_LOGO_UPLOAD_MODE"
          test -n "$NEXT_PUBLIC_MERCHANT_STORE_SYNC_MODE"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build production image
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: ${{ env.IMAGE_NAME }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ env.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_API_BASE_URL=${{ env.NEXT_PUBLIC_API_BASE_URL }}
            NEXT_PUBLIC_STORE_LOGO_UPLOAD_MODE=${{ env.NEXT_PUBLIC_STORE_LOGO_UPLOAD_MODE }}
            NEXT_PUBLIC_MERCHANT_STORE_SYNC_MODE=${{ env.NEXT_PUBLIC_MERCHANT_STORE_SYNC_MODE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Package image
        run: docker save "$IMAGE_NAME" | gzip -1 > frontend-image.tar.gz

      - name: Configure SSH
        env:
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_KNOWN_HOSTS: ${{ secrets.EC2_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "$EC2_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          printf '%s\n' "$EC2_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Transfer deployment files
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/deploy_key "$EC2_USER@$EC2_HOST" 'mkdir -p ~/kingstore/frontend'
          scp -i ~/.ssh/deploy_key \
            frontend-image.tar.gz docker-compose.production.yml \
            "$EC2_USER@$EC2_HOST:~/kingstore/frontend/"

      - name: Deploy container
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/deploy_key "$EC2_USER@$EC2_HOST" \
            "FRONTEND_IMAGE='$IMAGE_NAME' bash -s" <<'REMOTE'
          set -euo pipefail
          cd ~/kingstore/frontend
          export FRONTEND_IMAGE
          docker load --input frontend-image.tar.gz
          docker compose -f docker-compose.production.yml up -d --remove-orphans
          rm -f frontend-image.tar.gz
          docker image prune -f
          docker compose -f docker-compose.production.yml ps
          REMOTE

      - name: Verify deployment
        run: |
          curl --fail --show-error --silent \
            --retry 12 --retry-connrefused --retry-delay 5 \
            "http://$EC2_HOST/admin/login" > /dev/null

      - name: Remove temporary credentials
        if: always()
        run: rm -f ~/.ssh/deploy_key frontend-image.tar.gz
