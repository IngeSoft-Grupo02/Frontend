services:
  frontend:
    image: ${FRONTEND_IMAGE:?FRONTEND_IMAGE is required}
    container_name: kingstore-frontend
    ports:
      - "80:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3000/admin/login"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

